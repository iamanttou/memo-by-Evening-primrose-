<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel Memo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ヘッダー -->
    <header>
        <h1>🌸 Pastel Memo</h1>
    </header>

    <main class="container">

        <!-- 左側：編集画面 -->
        <section class="editor">

            <input
                type="text"
                id="title"
                placeholder="タイトル"
            >

            <div class="info">
                <span id="createdAt">作成日：-</span>
                <span id="updatedAt">更新日：-</span>
            </div>

            <textarea
                id="content"
                placeholder="ここにメモを書いてね。

例
今日は数学を勉強した。
#勉強 #数学"
            ></textarea>

            <div class="editor-buttons">
                <button id="newBtn">＋ 新規メモ</button>
                <button id="deleteBtn">🗑 削除</button>
            </div>

        </section>

        <!-- 右側：サイドバー -->
        <aside class="sidebar">

            <!-- タグ -->
            <section class="tags">

                <h2>🏷 タグ</h2>

                <div id="tagList">
                    <!-- JavaScriptで生成 -->
                </div>

            </section>

            <!-- メモ一覧 -->
            <section class="memo-list">

                <h2>📝 メモ一覧</h2>

                <div id="memoList">
                    <!-- JavaScriptで生成 -->
                </div>

            </section>

        </aside>

    </main>

    <!-- テンプレート -->
    <template id="memoTemplate">

        <div class="memo-card">

            <h3 class="memo-title"></h3>

            <p class="memo-preview"></p>

            <div class="memo-tags"></div>

            <small class="memo-date"></small>

        </div>

    </template>

    <script src="script.js"></script>

</body>
</html>
