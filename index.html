<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memo by Evening Primrose</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===========================
         Header
    ============================ -->

    <header class="topbar">

        <div class="logo">
            🌙 <strong>Memo</strong>
            <span>by Evening Primrose</span>
        </div>

        <div class="searchArea">

            <input
                id="searchInput"
                type="search"
                placeholder="メモ・タグ・フォルダを検索..."
            >

        </div>

        <div class="topButtons">

            <select id="sortSelect">

                <option value="updated">
                    最近更新
                </option>

                <option value="created">
                    作成日
                </option>

                <option value="name">
                    名前順
                </option>

                <option value="recent">
                    最近開いた
                </option>

            </select>

            <button id="menuBtn">
                ☰
            </button>

        </div>

    </header>

    <!-- ===========================
         Main
    ============================ -->

    <main class="layout">

        <!-- =======================
             Left Editor
        ======================== -->

        <section id="editor">

            <div class="editorHeader">

                <input
                    id="title"
                    type="text"
                    placeholder="タイトル"
                >

                <div class="editorActions">

                    <button id="favoriteBtn" title="お気に入り">
                        ⭐
                    </button>

                    <button id="pinBtn" title="ピン留め">
                        📌
                    </button>

                    <button id="imageBtn" title="画像">
                        🖼
                    </button>

                    <button id="drawBtn" title="手書き">
                        ✏
                    </button>

                    <button id="linkBtn" title="リンク">
                        🔗
                    </button>

                    <button id="emojiBtn" title="絵文字">
                        😊
                    </button>

                </div>

            </div>

            <textarea
                id="content"
                placeholder="ここにメモを書こう..."
            ></textarea>

            <div id="attachmentArea">

                <div id="imagePreview"></div>

                <div id="drawingPreview"></div>

            </div>

            <div class="statusBar">

                <span id="saveStatus">
                    自動保存
                </span>

                <span id="wordCount">
                    0文字
                </span>

            </div>

        </section>

        <!-- =======================
             Right Sidebar
        ======================== -->

        <aside id="sidebar">

            <div class="sidebarHeader">

                <h2>
                    フォルダ
                </h2>

            </div>

            <div id="folderList">

                <!--

                🟥 創作 ▼

                    📄 世界観

                    📄 キャラ

                -->

            </div>

            <div class="sidebarFooter">

                <button id="newFolderBtn">

                    ＋ フォルダ追加

                </button>

            </div>

        </aside>
