<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Memo by Evening Primrose</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ==========================
         Header
    =========================== -->

    <header class="topbar">

        <div class="logo">
            🌙 Memo by <span>Evening Primrose</span>
        </div>

        <div class="topbar-center">

            <input
                id="searchInput"
                type="search"
                placeholder="検索..."
            >

        </div>

        <div class="topbar-right">

            <select id="sortSelect">

                <option value="updated">
                    最近更新
                </option>

                <option value="created">
                    作成順
                </option>

                <option value="name">
                    名前順
                </option>

                <option value="recent">
                    最近開いた
                </option>

            </select>

            <button id="menuBtn">
                ☰
            </button>

        </div>

    </header>

    <!-- ==========================
         Main
    =========================== -->

    <main>

        <!-- ======================
             Editor
        ======================= -->

        <section id="editor">

            <div class="editorHeader">

                <input
                    id="title"
                    type="text"
                    placeholder="タイトル"
                >

                <div class="editorButtons">

                    <button id="favoriteBtn">
                        ⭐
                    </button>

                    <button id="pinBtn">
                        📌
                    </button>

                    <button id="imageBtn">
                        🖼
                    </button>

                    <button id="drawBtn">
                        ✏
                    </button>

                    <button id="linkBtn">
                        🔗
                    </button>

                    <button id="tagBtn">
                        #
                    </button>

                    <button id="emojiBtn">
                        😊
                    </button>

                </div>

            </div>

            <textarea
                id="content"
                placeholder="ここに自由にメモを書こう..."
            ></textarea>

            <div id="thumbnailArea"></div>

        </section>

        <!-- ======================
             Sidebar
        ======================= -->

        <aside id="sidebar">

            <div id="homeCards">

                <div class="homeCard">

                    <h3>📌 ピン留め</h3>

                    <div id="pinnedList"></div>

                </div>

                <div class="homeCard">

                    <h3>🕒 最近開いた</h3>

                    <div id="recentList"></div>

                </div>

                <div class="homeCard">

                    <h3>🎲 おすすめ</h3>

                    <div id="randomNote"></div>

                </div>

            </div>

            <hr>

            <div id="folderList">

                <!-- JSで生成 -->

            </div>

            <div class="sidebarBottom">

                <button id="newFolderBtn">
                    ＋ フォルダ追加
                </button>

            </div>

        </aside>

    </main>

    <!-- ==========================
         Hidden Inputs
    =========================== -->

    <input
        id="imageInput"
        type="file"
        accept="image/*"
        hidden
    >

    <!-- ==========================
         Draw Modal
    =========================== -->

    <div id="drawModal" class="modal hidden">

        <div class="modalContent">

            <div class="modalHeader">

                <h2>手書きメモ</h2>

                <button id="closeDraw">
                    ✖
                </button>

            </div>

            <canvas
                id="drawCanvas"
                width="700"
                height="400"
            ></canvas>

            <div class="canvasButtons">

                <button id="clearCanvas">
                    全消し
                </button>

                <button id="saveCanvas">
                    保存
                </button>

            </div>

        </div>

    </div>

    <!-- ==========================
         Toast
    =========================== -->

    <div
        id="toast"
        class="toast"
    >
        保存しました
    </div>

    <!-- ==========================
         Script
    =========================== -->

    <script src="script.js"></script>

</body>

</html>
