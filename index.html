<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PastelMemo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== ヘッダー ===== -->
    <header>

        <div class="logo">
            📒 <span>PastelMemo</span>
        </div>

        <div class="searchBox">
            <input
                id="searchInput"
                type="text"
                placeholder="🔍 メモを検索..."
            >
        </div>

        <button id="menuBtn" title="メニュー">
            ☰
        </button>

    </header>

    <!-- ===== メイン ===== -->
    <main>

        <!-- ========================= -->
        <!-- 左側 編集エリア -->
        <!-- ========================= -->
        <section id="editor">

            <div class="editorHeader">

                <input
                    id="title"
                    type="text"
                    placeholder="タイトル"
                    maxlength="100"
                >

                <div class="editorButtons">

                    <button id="newNoteBtn">
                        ➕ 新しいメモ
                    </button>

                    <button id="favoriteBtn">
                        ⭐
                    </button>

                    <button id="pinBtn">
                        📌
                    </button>

                </div>

            </div>
